<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <rect width="44" height="44" rx="8" fill="#1e1e1e"/>
  <!-- Respaldo de la silla -->
  <rect x="12" y="6" width="20" height="14" rx="2" fill="#6b4c36"/>
  <!-- Asiento -->
  <rect x="10" y="21" width="24" height="5" rx="1.5" fill="#f7f3ee"/>
  <!-- Patas delanteras -->
  <line x1="14" y1="26" x2="13" y2="39" stroke="#f7f3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="26" x2="31" y2="39" stroke="#f7f3ee" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Patas traseras (mas claras) -->
  <line x1="17" y1="26" x2="16" y2="39" stroke="#6b4c36" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="27" y1="26" x2="28" y2="39" stroke="#6b4c36" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Detalle terracota en el respaldo -->
  <rect x="12" y="17" width="20" height="3" rx="1" fill="#c4704f" opacity="0.7"/>
</svg>
